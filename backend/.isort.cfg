[settings]
profile = black
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88
known_first_party = src
known_third_party = fastapi,pydantic,sqlalchemy,uvicorn,httpx,pytest,passlib,jose,python-jose,argon2

# Skip files that have environment-specific formatting
skip = src/main.py,src/api/auth.py,src/api/tasks.py,src/schemas/__init__.py
